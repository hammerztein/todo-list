<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Document</title>
	</head>
	<body>
		<h1>Todo Project</h1>
		<button command="show-modal" commandfor="project-modal">Add Project</button>
		<dialog class="modal" id="project-modal">
			<div class="modal-title">
				Project
				<button commandfor="project-modal" command="close">Close</button>
			</div>
			<form action="" class="form project-form">
				<label for="">Project Title: </label>
				<input
					type="text"
					required
					name="project-title"
					id="project-title"
					min="1"
					autofocus />
				<button type="submit">Add Project</button>
			</form>
		</dialog>
		<ul class="projects"></ul>
	</body>
</html>
