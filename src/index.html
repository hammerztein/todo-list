<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Taskpocalypse</title>
	</head>
	<body>
		<main class="container">
			<aside class="sidebar">
				<header>
					<h1>Taskpocalypse</h1>
				</header>
				<nav>
					<ul class="projects"></ul>
				</nav>
				<footer>
					<button
						command="show-modal"
						commandfor="project-modal"
						data-button-type="add"
						id="add-project-btn"
						class="add-btn"
						type="button">
						<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
							<title>plus</title>
							<path d="M19,13H13V19H11V13H5V11H11V5H13V11H19V13Z" />
						</svg>
						<span>Add Project</span>
					</button>
				</footer>
			</aside>
			<section class="content">
				<header>
					<h2>Project Board</h2>
					<button
						command="show-modal"
						commandfor="todo-modal"
						data-button-type="add"
						id="add-todo-btn"
						class="add-btn"
						type="button">
						<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
							<title>plus</title>
							<path d="M19,13H13V19H11V13H5V11H11V5H13V11H19V13Z" />
						</svg>
						<span>Add Todo</span>
					</button>
				</header>
				<div class="todo-sections">
					<section class="todo-group" id="not-done-todos">
						<header>
							<h3>Not Done</h3>
							<span id="not-done-count">0</span>
						</header>
						<ul class="todos"></ul>
					</section>
					<section class="todo-group" id="done-todos">
						<header>
							<h3>Done</h3>
							<span id="done-count">0</span>
						</header>
						<ul class="todos"></ul>
					</section>
				</div>
			</section>
		</main>
		<dialog id="project-modal">
			<form action="" class="modal-form project-form">
				<header>
					<h3>Create Project</h3>
					<button commandfor="project-modal" command="close" type="button">
						<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
							<title>close</title>
							<path
								d="M19,6.41L17.59,5L12,10.59L6.41,5L5,6.41L10.59,12L5,17.59L6.41,19L12,13.41L17.59,19L19,17.59L13.41,12L19,6.41Z" />
						</svg>
					</button>
				</header>
				<div class="form-inputs">
					<div>
						<label for="project-title">Project Title*</label>
						<input
							type="text"
							required
							name="project-title"
							id="project-title"
							min="1"
							autofocus
							placeholder="Your project name" />
						<span>Please insert project title</span>
					</div>
				</div>
				<footer>
					<button commandfor="project-modal" command="close" type="button">
						Cancel
					</button>
					<button type="submit">Create Project</button>
				</footer>
			</form>
		</dialog>
		<dialog id="todo-modal">
			<form action="" class="modal-form todo-form">
				<header>
					<h3>Create Todo</h3>
					<button commandfor="todo-modal" command="close" type="button">
						<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
							<title>close</title>
							<path
								d="M19,6.41L17.59,5L12,10.59L6.41,5L5,6.41L10.59,12L5,	17.59L6.41,19L12,13.41L17.59,19L19,17.59L13.41,12L19,6.41Z" />
						</svg>
					</button>
				</header>
				<div class="form-inputs">
					<div>
						<label for="todo-title">Todo Title*</label>
						<input
							type="text"
							required
							name="todo-title"
							id="todo-title"
							min="1"
							autofocus
							placeholder="Your todo name" />
						<span>Please insert todo title</span>
					</div>
					<div class="col-2">
						<div>
							<label for="todo-status">Status*</label>
							<select name="todo-status" id="todo-status" required>
								<option value="" disabled selected>Select Status</option>
								<option value="false">Not Done</option>
								<option value="true">Done</option>
							</select>
							<span>Please select todo status</span>
						</div>
						<div>
							<label for="todo-date">Status <em>(optional)</em></label>
							<input type="date" name="todo-date" id="todo-date" />
						</div>
					</div>
				</div>
				<footer>
					<button commandfor="todo-modal" command="close" type="button">
						Cancel
					</button>
					<button type="submit">Create Todo</button>
				</footer>
			</form>
		</dialog>
	</body>
</html>
